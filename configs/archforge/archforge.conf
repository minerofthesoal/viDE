# ==============================================================================
# ArchForge DE - Main Configuration File
# Syntax: Declarative block-based configuration
# ==============================================================================

[monitors]
# Format: name, resolution@refresh_rate, position, scale
monitor = eDP-1, 2560x1600@120, 0x0, 1.5
monitor = DP-1, preferred, auto, 1
monitor = fallback, 1920x1080@60, auto, 1

[autostart]
# Core DE Components
exec-once = python3 /opt/archforge/archforge-de/shell/panel/main.py
exec-once = python3 /opt/archforge/archforge-de/shell/dock/main.py
exec-once = swaync                   # Notification center
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Wallpaper & Environment
exec-once = swww-daemon --format xrgb
exec-once = swww img /usr/share/archforge/wallpapers/default.jpg

[input]
kb_layout = us
kb_variant =
kb_options = caps:escape # Map CapsLock to Escape for developers
touchpad_natural_scroll = true
touchpad_tap_to_click = true
mouse_sensitivity = 0.2

[aesthetics]
# Blending ReviOS minimalism with macOS polish
gaps_in = 6
gaps_out = 12
border_size = 2

# Colors (Hex with Alpha)
active_border = rgba(00ff99ee) rgba(33ccffee) 45deg
inactive_border = rgba(595959aa)

# macOS-like rounded corners and blur
rounding = 12
blur_enabled = true
blur_size = 8
blur_passes = 3
blur_optimize = true

# Animations (Bezier curves for smooth, Apple-like fluidity)
animation_curve = easeOutQuint, 0.22, 1, 0.36, 1
animation_speed = 4

[keybinds]
# SUPER = Windows/Command Key

# --- Application Launcher (Spotlight Style) ---
bind = SUPER, Space, exec, python3 /opt/archforge/archforge-de/shell/launcher/main.py

# --- Control Center (macOS Style) ---
bind = SUPER, C, exec, python3 /opt/archforge/archforge-de/shell/control-center/main.py

# --- Local AI Assistant (Lazy Loaded) ---
bind = SUPER, A, exec, python3 /opt/archforge/archforge-de/ai/app.py

# --- App Store ---
bind = SUPER, S, exec, python3 /opt/archforge/archforge-de/appstore/main.py

# --- ForgeEdit (CRust IDE) ---
bind = SUPER, T, exec, python3 /opt/archforge/archforge-de/apps/forge-edit/main.py

# --- Core Applications ---
bind = SUPER, Return, exec, kitty
bind = SUPER, E, exec, thunar
bind = SUPER, B, exec, firefox

# --- Window Management (Win11 / KDE Style Snapping) ---
bind = SUPER, Q, killactive
bind = SUPER, F, togglefloating
bind = SUPER, M, fullscreen, 1
bind = SUPER, Left, movewindow, l
bind = SUPER, Right, movewindow, r
bind = SUPER, Up, movewindow, u
bind = SUPER, Down, movewindow, d
bind = SUPER SHIFT, Q, exit

# --- Virtual Desktops (Win11 / KDE Style) ---
bind = CTRL SUPER, Right, workspace, +1
bind = CTRL SUPER, Left, workspace, -1
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2

# --- Media & System Controls ---
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# --- Screenshots ---
bind = , Print, exec, grim - | wl-copy
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

[window_rules]
# Float specific applications
rule = float, ^(pavucontrol)$
rule = float, ^(nm-connection-editor)$
rule = float, ^(archforge-installer)$
rule = float, ^(archforge-ai)$

# Shell Components Blur (Matches Compositor Aesthetic)
rule = blur, ^(archforge-dock)$
rule = blur, ^(archforge-control-center)$
rule = ignorealpha 0.2, ^(archforge-dock)$
rule = ignorealpha 0.2, ^(archforge-control-center)$
